name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'
      - name: Install dependencies
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: zenlog_test
          POSTGRES_USER: zenlog
          POSTGRES_PASSWORD: zenlog_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run domain tests
        run: pytest tests/domain/ -v --tb=short
      - name: Run integration tests
        run: pytest tests/infrastructure/ -v --tb=short || [ $? -eq 5 ]
        env:
          DB_NAME: zenlog_test
          DB_USER: zenlog
          DB_PASSWORD: zenlog_test
          DB_HOST: localhost
          DB_PORT: '5432'
          SECRET_KEY: test-secret-key
          DEBUG: 'False'
